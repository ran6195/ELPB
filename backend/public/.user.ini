; PHP settings for handling large file uploads (videos)
; This file will be read by PHP-FPM when placed in the web root

; Maximum size of a single uploaded file
upload_max_filesize = 100M

; Maximum size of POST data (must be >= upload_max_filesize)
post_max_size = 110M

; Memory limit (should be > post_max_size)
memory_limit = 256M

; Maximum execution time (for large uploads)
max_execution_time = 300

; Maximum input time
max_input_time = 300
